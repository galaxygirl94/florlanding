name: Scrape RI Nursing Jobs

on:
  schedule:
    # Run daily at 6:00 AM ET (10:00 UTC)
    - cron: "0 10 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flor-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: flor-app/package-lock.json

      - run: npm ci

      - name: Run RI.gov scraper
        run: npx tsx src/scrapers/ri-gov-scraper.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/scraped-ri-gov-jobs.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push scraped data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scraped-ri-gov-jobs.json
          git commit -m "chore: update scraped RI nursing jobs $(date -u +%Y-%m-%d)"
          git push
